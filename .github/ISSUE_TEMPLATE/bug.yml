name: Bug report
description: Something built isn't working as documented.
title: "[Bug] "
labels: ["bug"]
assignees:
  - Raja4Shekar
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Try to give enough detail that someone
        coming in cold can reproduce it without follow-up. If the bug is
        a security issue (asset loss, oracle drift, sanctions bypass,
        cross-chain message forgery, etc.) **stop and email the security
        team first** — do NOT file a public Issue. See the runbook
        `docs/ops/IncidentRunbook.md`.

  - type: input
    id: surface
    attributes:
      label: Where in the system
      description: "Module (frontend page / contract facet / Worker / bot / runbook). Pick the closest match."
      placeholder: "e.g. apps/defi pages/LoanDetails.tsx, or contracts/src/facets/RiskFacet.sol"
    validations:
      required: true

  - type: input
    id: chain
    attributes:
      label: Chain
      description: "Which chain (mainnet / testnet)? Mark `cross-chain` if multiple."
      placeholder: "Base Sepolia / Arbitrum mainnet / cross-chain"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: "Minimum sequence of actions to reproduce. Include addresses / tx hashes / loan IDs where relevant."
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: "Include error messages, screenshots, transaction reverts, etc."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Critical — funds at risk / liquidation path broken"
        - "High — feature unusable, no workaround"
        - "Medium — feature degraded, workaround exists"
        - "Low — cosmetic / minor"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "Browser + version, wallet (MetaMask / Rabby), connected chain, frontend commit hash from the footer."

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: "Logs from the diagnostics drawer, related issues, hypotheses, anything else."
